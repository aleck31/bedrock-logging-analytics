  <!-- Magnifying glass -->
  <circle cx="27" cy="27" r="18" fill="none" stroke="#60A5FA" stroke-width="3.5"/>
  <line x1="40" y1="40" x2="50" y2="50" stroke="#60A5FA" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Mini bars inside lens -->
  <rect x="17" y="29" width="6" height="12" rx="1" fill="#F97316"/>
  <rect x="25" y="22" width="6" height="19" rx="1" fill="#10B981"/>
  <rect x="33" y="26" width="6" height="15" rx="1" fill="#3B82F6"/>
